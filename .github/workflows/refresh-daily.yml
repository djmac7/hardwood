name: refresh-daily

# Once a day: heavier pulls that change slowly — current rosters (trades/signings),
# forward contract years, and the draft board. Commits any changes back to the repo.

on:
  schedule:
    - cron: "0 8 * * *"      # 08:00 UTC daily
  workflow_dispatch: {}

concurrency:
  group: refresh-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fetch rosters / contracts / draft
        run: |
          python3 build/fetch_live.py rosters contracts draft
          python3 build/fill_history.py
          python3 build/build_team_lineage.py
          python3 build/write_status.py
      - name: Rebuild prerendered SEO pages + sitemap
        run: python3 build/build_seo.py
      - name: Rebuild players filter table
        run: python3 build/build_players_table.py
      - name: Rebuild teams + per-season player filter tables
        run: |
          python3 build/build_teams_table.py
          python3 build/build_players_season.py
      - name: Validate data (block bad refreshes)
        run: python3 build/validate_data.py
      - name: Commit if changed
        run: |
          git config user.name  "dunkwise-bot"
          git config user.email "dunkwise-bot@users.noreply.github.com"
          git add data/ players/ teams/ game/ sitemap.xml robots.txt
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): daily refresh $(date -u +%Y-%m-%d)"
            git push
          fi
