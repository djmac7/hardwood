name: refresh-live

# Pulls the fast-moving data (injuries, odds, scores, standings, news) from ESPN /
# The Odds API and commits any changes back to the repo, which redeploys the site.
# Odds require a repo secret named ODDS_API_KEY (free tier at the-odds-api.com).

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min (GitHub may delay a few min under load)
  workflow_dispatch: {}

concurrency:
  group: refresh-live
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fetch live data
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python3 build/fetch_live.py injuries odds scores standings
          python3 build/fetch_news.py
          python3 build/write_status.py
      - name: Commit if changed
        run: |
          git config user.name  "hardwood-bot"
          git config user.email "hardwood-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): live refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
