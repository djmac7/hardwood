name = "vantage"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Serve the dashboard and tracker as static assets from ../dashboard and ../tracker.
# (Optional — you can also host the dashboard on GitHub Pages and point it at this worker.)

[[d1_databases]]
binding = "DB"
database_name = "vantage"
database_id = "REPLACE_WITH_D1_DATABASE_ID"   # `wrangler d1 create vantage` prints this

[vars]
# Comma-separated origins allowed to read the stats API (your dashboard host).
# "*" is fine while the dashboard is public/read-only; lock it down for private data.
ALLOWED_ORIGINS = "*"
# Rotated daily and mixed into the visitor hash. Any random string.
SALT = "change-me-to-a-long-random-string"
