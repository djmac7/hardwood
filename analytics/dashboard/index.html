<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Vantage — Audience &amp; Ad Yield</title>
<meta name="description" content="Cookieless analytics for ad-monetized content sites." />
<meta name="theme-color" content="#faf9f5" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#1f1e1c" media="(prefers-color-scheme: dark)" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/ds/tokens.css" />
<script>try{var t=localStorage.getItem('vg-theme');if(t&&t!=='system')document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
<link rel="stylesheet" href="dashboard.css" />
</head>
<body>
<div class="shell">

  <aside class="sidebar">
    <div class="brand"><span class="dot"></span> Vantage</div>

    <!-- Workspace switcher (Claude's project/org picker) -->
    <div class="menu-anchor">
      <button class="workspace" id="wsBtn" aria-haspopup="menu" aria-expanded="false">
        <span class="ws-avatar" id="wsAvatar">H</span>
        <span class="ws-name" id="wsName">Dunkwise</span>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 10l4 4 4-4"/></svg>
      </button>
      <div class="menu" id="siteMenu" role="menu" hidden>
        <div class="menu-label">Sites</div>
        <button class="menu-item on" role="menuitemradio" data-site="dunkwise">
          <span class="mi-avatar">D</span><span class="mi-name">Dunkwise</span>
          <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg>
        </button>
        <button class="menu-item" role="menuitemradio" data-site="six-spins">
          <span class="mi-avatar">S</span><span class="mi-name">Six Spins</span>
          <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg>
        </button>
      </div>
    </div>

    <nav class="side-nav" id="viewNav" aria-label="Reports">
      <span class="nav-label">Reports</span>
      <button data-view="overview" class="on">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="3" width="8" height="8" rx="1.6"/><rect x="13" y="3" width="8" height="5" rx="1.6"/><rect x="13" y="11" width="8" height="10" rx="1.6"/><rect x="3" y="14" width="8" height="7" rx="1.6"/></svg>
        Overview</button>
      <button data-view="content">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
        Content</button>
      <button data-view="acquisition">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3v18M12 3l-4 4M12 3l4 4"/></svg>
        Acquisition</button>
      <button data-view="performance">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19a8 8 0 0 1 16 0"/><path d="M12 13l4-4"/></svg>
        Performance</button>
    </nav>

    <!-- Account row (Claude's bottom user row + menu) -->
    <div class="side-foot menu-anchor">
      <button class="account" id="acctBtn" aria-haspopup="menu" aria-expanded="false">
        <span class="acct-avatar">D</span>
        <span class="acct-meta"><b>dj@rev.iq</b><span>Cookieless · no banner</span></span>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 10l4 4 4-4"/></svg>
      </button>
      <div class="menu up" id="acctMenu" role="menu" hidden>
        <div class="menu-label">Appearance</div>
        <button class="menu-item" data-theme="light">
          <svg class="mi-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M18.4 5.6L17 7M7 17l-1.4 1.4"/></svg>
          Light<svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg></button>
        <button class="menu-item" data-theme="dark">
          <svg class="mi-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z"/></svg>
          Dark<svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg></button>
        <button class="menu-item" data-theme="system">
          <svg class="mi-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="12" rx="1.6"/><path d="M8 20h8M12 16v4"/></svg>
          System<svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg></button>
      </div>
    </div>
  </aside>

  <div class="main">
    <header class="main-top">
      <div class="mt-title">
        <h1 id="viewTitle">Overview</h1>
        <p class="mt-sub" id="viewSub">All traffic · last 7 days</p>
      </div>
      <div class="mt-right">
        <div class="rt-pill" id="rtPill" title="Visitors active in the last 5 minutes">
          <span class="rt-live"></span><b>—</b><span class="rt-word">online</span>
        </div>
        <div class="range" id="rangeCtl" role="tablist" aria-label="Date range">
          <button role="tab" data-range="24h">24H</button>
          <button role="tab" data-range="7d" class="on">7D</button>
          <button role="tab" data-range="30d">30D</button>
          <button role="tab" data-range="90d">90D</button>
        </div>
      </div>
    </header>

    <main class="view" id="app"><div class="boot"><span class="spinner"></span></div></main>
  </div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
